{{- if and (eq .Values.cloudProvider "aws") (.Values.aws.controllersKubernetes.enabled) }}
apiVersion: iam.services.k8s.aws/v1alpha1
kind: Policy
metadata:
  name: {{ include "k8s-cloud-tagger.fullname" . }}-policy
spec:
  name: {{ include "k8s-cloud-tagger.fullname" . }}-policy
  description: "Minimal permissions for k8s-cloud-tagger to tag EBS volumes"
  policyDocument: |
    {
      "Version": "2012-10-17",
      "Statement": [
        {
          "Effect": "Allow",
          "Action": [
            "ec2:DescribeVolumes",
            "ec2:CreateTags"
          ],
          "Resource": "*"
        }
      ]
    }
{{- end }}
