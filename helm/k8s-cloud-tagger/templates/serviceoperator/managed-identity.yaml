{{- if and (eq .Values.cloudProvider "azure") (.Values.azure.serviceOperator.enabled) }}
apiVersion: managedidentity.azure.com/v1api20230131
kind: UserAssignedIdentity
metadata:
  name: {{ .Values.azure.managedIdentity }}
  annotations:
    serviceoperator.azure.com/reconcile-policy: detach-on-delete
spec:
  location: {{ required "azure.location is required" .Values.azure.location }}
  owner:
    name: {{ required "azure.resourceGroup is required" .Values.azure.resourceGroup }}
  operatorSpec:
    configMaps:
      principalId:
        name: {{ .Values.azure.serviceOperator.identityConfigMap | default (printf "%s-identity" (include "k8s-cloud-tagger.fullname" .)) }}
        key: principalId
      clientId:
        name: {{ .Values.azure.serviceOperator.identityConfigMap | default (printf "%s-identity" (include "k8s-cloud-tagger.fullname" .)) }}
        key: clientId
{{- end }}
